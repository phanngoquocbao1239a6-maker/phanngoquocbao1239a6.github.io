<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lịch học tháng - Học kỳ 2, 2025-2026</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --line: #d9e1ef;
      --text: #172033;
      --muted: #667085;
      --blue: #2445b8;
      --orange: #f97316;
      --red: #dc2626;
      --green: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .top {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      color: var(--blue);
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, select {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover, select:hover { border-color: var(--blue); }
    .calendar {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }
    .month-title {
      padding: 18px;
      background: var(--blue);
      color: white;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .dow {
      padding: 12px 8px;
      text-align: center;
      font-weight: 800;
      background: #eef2ff;
      border-bottom: 1px solid var(--line);
      color: var(--blue);
    }
    .day {
      min-height: 142px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      background: #fff;
    }
    .day:nth-child(7n) { border-right: 0; }
    .date {
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .other { background: #f8fafc; }
    .other .date { opacity: .35; }
    .event {
      margin: 6px 0;
      padding: 7px 8px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.35;
      border-left: 4px solid var(--blue);
      background: #eef2ff;
    }
    .event .time { font-weight: 800; }
    .event .name { font-weight: 750; }
    .net { border-left-color: var(--blue); background: #eef2ff; }
    .tm { border-left-color: var(--orange); background: #fff7ed; }
    .qp { border-left-color: var(--green); background: #ecfdf5; }
    .exam { border-left-color: var(--red); background: #fef2f2; }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 6px; }
    .blue { background: var(--blue); }
    .orange { background: var(--orange); }
    .green { background: var(--green); }
    .red { background: var(--red); }
    @media (max-width: 760px) {
      .wrap { padding: 12px; }
      .grid { display: block; }
      .dow { display: none; }
      .day { min-height: auto; border-right: 0; }
      .other { display: none; }
      .date::before { content: attr(data-dow) " - "; color: var(--blue); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Lịch học theo tháng</h1>
      <div class="controls">
        <button id="prev">‹ Tháng trước</button>
        <select id="month"></select>
        <button id="next">Tháng sau ›</button>
      </div>
    </div>

    <div class="calendar">
      <div class="month-title" id="title"></div>
      <div class="grid" id="calendar"></div>
    </div>

    <div class="legend">
      <span><i class="dot blue"></i>Lập trình .NET</span>
      <span><i class="dot orange"></i>Thương mại điện tử</span>
      <span><i class="dot green"></i>QP2104</span>
      <span><i class="dot red"></i>Kiểm tra</span>
    </div>
  </div>

  <script>
    const events = [
      // Lập trình .NET
      ...['2026-01-26','2026-02-02','2026-02-09','2026-02-16','2026-03-02','2026-03-09','2026-03-16','2026-03-23','2026-03-30','2026-04-06'].map(date => ({ date, time:'07:00–08:20', name:'Lập trình .NET', room:'C0902', cls:'net' })),
      ...['2026-01-28','2026-02-04','2026-03-04','2026-03-11','2026-03-18','2026-03-25','2026-04-01'].map(date => ({ date, time:'07:00–08:20', name:'Lập trình .NET', room:'C0902', cls:'net' })),
      ...['2026-03-10','2026-03-17','2026-03-24','2026-03-31','2026-04-07'].map(date => ({ date, time:'12:30–17:30', name:'Lập trình .NET', room:'A0206 - Máy tính 6', cls:'net' })),
      ...['2026-03-12','2026-03-19','2026-03-26','2026-04-02','2026-04-09'].map(date => ({ date, time:'12:30–17:30', name:'Lập trình .NET', room:'A0206 - Máy tính 6', cls:'net' })),
      { date:'2026-04-24', time:'08:30', name:'KIỂM TRA KTHP - Lập trình .NET', room:'A0204 - Máy tính 3', cls:'exam' },

      // Thương mại điện tử
      ...['2026-05-05','2026-05-12','2026-05-19','2026-05-26','2026-06-02','2026-06-09','2026-06-16','2026-06-23'].map(date => ({ date, time:'09:30–10:50', name:'Thương mại điện tử', room:'B0210', cls:'tm' })),
      ...['2026-05-07','2026-05-14','2026-05-21','2026-05-28','2026-06-04','2026-06-11','2026-06-18'].map(date => ({ date, time:'09:30–10:50', name:'Thương mại điện tử', room:'B0210', cls:'tm' })),
      ...['2026-05-27','2026-06-03','2026-06-10','2026-06-17','2026-06-24'].map(date => ({ date, time:'12:30–17:30', name:'Thương mại điện tử', room:'A0204 - Máy tính 3', cls:'tm' })),

      // Quốc phòng
      ...['2026-05-08','2026-05-15','2026-05-22','2026-05-29','2026-06-05','2026-06-12','2026-06-19'].map(date => ({ date, time:'06:30–11:30', name:'QP2104 - Kỹ thuật chiến đấu bộ binh và chiến thuật', room:'VLU_Nhà thi đấu 1', cls:'qp' })),
      ...['2026-05-09','2026-05-16','2026-05-23'].map(date => ({ date, time:'06:30–11:30', name:'QP2104 - Kỹ thuật chiến đấu bộ binh và chiến thuật', room:'VLU_Nhà thi đấu 1', cls:'qp' }))
    ];

    const months = [
      { y: 2026, m: 0, label: 'Tháng 1/2026' },
      { y: 2026, m: 1, label: 'Tháng 2/2026' },
      { y: 2026, m: 2, label: 'Tháng 3/2026' },
      { y: 2026, m: 3, label: 'Tháng 4/2026' },
      { y: 2026, m: 4, label: 'Tháng 5/2026' },
      { y: 2026, m: 5, label: 'Tháng 6/2026' }
    ];
    const dows = ['Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy','Chủ Nhật'];
    let current = 2;

    const monthSelect = document.getElementById('month');
    months.forEach((x, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = x.label;
      monthSelect.appendChild(opt);
    });
    monthSelect.addEventListener('change', e => { current = Number(e.target.value); render(); });
    document.getElementById('prev').onclick = () => { current = Math.max(0, current - 1); render(); };
    document.getElementById('next').onclick = () => { current = Math.min(months.length - 1, current + 1); render(); };

    function isoDate(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }
    function mondayIndex(date) {
      return (date.getDay() + 6) % 7;
    }
    function render() {
      const { y, m, label } = months[current];
      document.getElementById('title').textContent = label;
      monthSelect.value = current;
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      dows.forEach(d => {
        const el = document.createElement('div');
        el.className = 'dow';
        el.textContent = d;
        cal.appendChild(el);
      });
      const first = new Date(y, m, 1);
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const startBlank = mondayIndex(first);
      const totalCells = Math.ceil((startBlank + daysInMonth) / 7) * 7;
      for (let i = 0; i < totalCells; i++) {
        const dayNum = i - startBlank + 1;
        const cell = document.createElement('div');
        cell.className = 'day';
        if (dayNum < 1 || dayNum > daysInMonth) {
          cell.classList.add('other');
          cal.appendChild(cell);
          continue;
        }
        const dateStr = isoDate(y, m, dayNum);
        const date = document.createElement('div');
        date.className = 'date';
        date.dataset.dow = dows[i % 7];
        date.textContent = dayNum;
        cell.appendChild(date);
        events.filter(e => e.date === dateStr).forEach(e => {
          const item = document.createElement('div');
          item.className = `event ${e.cls}`;
          item.innerHTML = `<div class="time">${e.time}</div><div class="name">${e.name}</div><div>${e.room}</div>`;
          cell.appendChild(item);
        });
        cal.appendChild(cell);
      }
    }
    render();
  </script>
</body>
</html>
